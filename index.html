<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>даркет — akolaps</title>
    <meta name="description" content="Персональная визитка Даркет (akolaps). Akolaps Project.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="style/fon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, sans-serif
        }

        :root {
            --bg: #f5f5f7;
            --fg: #1d1d1f;
            --muted: #6e6e73;
            --glass: rgba(255, 255, 255, .65);
            --accent: #0071e3
        }

        @media(prefers-color-scheme:dark) {
            :root {
                --bg: #0f0f11;
                --fg: #f5f5f7;
                --muted: #9a9aa1;
                --glass: rgba(28, 28, 32, .65)
            }
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            user-select: none
        }

        img {
            pointer-events: none
        }

        .mac-bar {
            position: fixed;
            top: 16px;
            width: 92%;
            height: 32px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding-left: 14px;
            gap: 8px;
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .08)
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%
        }

        .red {
            background: #ff5f56
        }

        .yellow {
            background: #ffbd2e
        }

        .green {
            background: #27c93f
        }

        .container {
            width: 92%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 60px;
            padding: 120px 40px 80px;
            align-items: center
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 36px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .08);
            transition: .4s
        }

        .glass:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, .12)
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-top: 6px
        }

        .contacts {
            display: flex;
            gap: 22px;
            margin: 22px 0 28px
        }

        .contacts a {
            font-size: 22px;
            transition: .25s
        }

        .contacts a:hover {
            transform: translateY(-2px);
            opacity: .85
        }

        .vk {
            color: #0077ff
        }

        .tg {
            color: #229ed9
        }

        h2 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px
        }

        .spec {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
            font-size: 14px;
            opacity: .85
        }

        .spec i {
            width: 22px;
            text-align: center;
            color: var(--accent)
        }

        .center {
            position: relative;
            display: flex;
            justify-content: flex-end
        }

        .blur-bg {
            position: absolute;
            width: 90%;
            height: 90%;
            background: url('style/fon.png') center/contain no-repeat;
            filter: blur(70px);
            opacity: .5
        }

        .hero-img {
            width: 440px;
            opacity: 0;
            animation: flyUp 1.4s ease-out forwards, breathe 9s ease-in-out infinite 1.4s
        }

        @keyframes flyUp {
            from {
                transform: translateY(160px) scale(.9);
                opacity: 0
            }

            to {
                transform: none;
                opacity: 1
            }
        }

        @keyframes breathe {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-14px)
            }
        }

        footer {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--muted);
            background: var(--glass);
            backdrop-filter: blur(16px);
            padding: 8px 18px;
            border-radius: 999px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .08)
        }

        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255, 255, 255, .35), transparent 60%);
            filter: blur(70px);
            transform: translate(-50%, -50%)
        }

        .scroll-hint {
            position: fixed;
            right: 24px;
            bottom: 24px;
            font-size: 12px;
            color: var(--muted);
            opacity: .6;
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: .4
            }

            50% {
                opacity: .8
            }
        }

        @media(max-width:900px) {
            .container {
                grid-template-columns: 1fr;
                gap: 40px
            }

            .center {
                justify-content: center
            }

            .hero-img {
                width: 300px
            }
        }
    </style>
</head>

<body>
    <div class="cursor-glow"></div>
    <div class="mac-bar">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
    </div>
    <div class="container">
        <div class="glass"><svg width="240" height="78" viewBox="0 0 240 78"><text x="0" y="42" font-size="34"
                    font-weight="600" fill="var(--fg)">darket.</text><text x="0" y="68" font-size="13"
                    fill="var(--muted)">CEO · Akolaps Project · 16 лет</text></svg>
            <div class="contacts">
                <a href="https://guns.lol/hewerrro" class="gl"><i class="fa-solid fa-gun"></i></a>
                <a href="https://kawr2r.t.me" class="tg"><i class="fa-brands fa-telegram"></i></a>
            </div>
            <h2>Комплектующие ПК</h2>
            <div class="spec"><i class="fa-solid fa-microchip"></i>Intel Core i9-13900KF</div>
            <div class="spec"><i class="fa-solid fa-server"></i>MSI MPG Z790 CARBON</div>
            <div class="spec"><i class="fa-solid fa-memory"></i>32 ГБ ADATA XPG Lancer</div>
            <div class="spec"><i class="fa-solid fa-display"></i>MSI RTX 4090</div>
            <div class="spec"><i class="fa-solid fa-hard-drive"></i>ADATA LEGEND 960 SSD</div>
            <div class="spec"><i class="fa-solid fa-bolt"></i>XPG CyberCore 1300W</div>
        </div>
        <div class="center">
            <div class="blur-bg"></div><img class="hero-img" src="style/fon.png" alt="hero">
        </div>
    </div>
    <div class="scroll-hint">scroll</div>
    <footer>Разработано командой <strong>Project Akolaps</strong> © 2026</footer><audio id="uiClick"
        preload="auto"></audio>
    <script>
    const glow = document.querySelector('.cursor-glow');

    window.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
    });

    const heroImg = document.querySelector('.hero-img');

    window.addEventListener('mousemove', (e) => {
        if (!heroImg) return;

        const rect = heroImg.getBoundingClientRect();
        const x =
            (e.clientX - (rect.left + rect.width / 2)) / rect.width;
        const y =
            (e.clientY - (rect.top + rect.height / 2)) / rect.height;

        heroImg.style.transform = `
            translateY(-8px)
            rotateX(${(-y * 6).toFixed(2)}deg)
            rotateY(${(x * 6).toFixed(2)}deg)
        `;
    });

    const uiClick = document.getElementById('uiClick');

    if (uiClick) {
        document.querySelectorAll('a, .glass').forEach((el) => {
            el.addEventListener('mouseenter', () => {
                uiClick.volume = 0.05;
                uiClick.play().catch(() => {});
            });
        });
    }
</script>

</body>

</html>
